<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img height="230" src="image.png" alt="Train Image">
    <br>
    <table>
        <caption>Employee Information</caption>
        <thead>
            <!-- header content -->
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Fav Language</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td>Software Engineer</td>
                <td>JavaScript</td>
            </tr>
            <tr>
                <td colspan="2">Jane Smith</td>
                <td rowspan="2">Data Scientist</td>
            </tr>
        </tbody>
        <tfoot>
            <!-- footer content -->
            <td colspan="2">Jane Smith</td>
            <td rowspan="2">foot</td>
        </tfoot>
    </table>

    <dl>
        <dt>Term 1</dt>
        <dd>Description for term 1</dd>
        <dt>Term 2</dt>
        <dd>Description for term 2</dd>
    </dl>

    <ul type="square">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <ol type="A">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
</body>

</html>
