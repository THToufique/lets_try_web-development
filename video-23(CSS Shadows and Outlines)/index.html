<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .box {
            border: 2px solid black;

            box-shadow: -2px 7px 5px rgb(166, 241, 156);
            padding: 45px;
        }

        .text-shadow {
            text-shadow: 2px 2px 1px #d7a2ed;
            outline: 2px solid red;
            border-radius: 25px;
            padding: 15px;
            margin: 23px auto;
            /* margin: auto; */
        }
    </style>
</head>

<body>
    <div class="box">I am a box</div>
    <p class="text-shadow">Lorem ipsum dolor sit amet consectetur adipisicing elit. Aspernatur, tempore distinctio
        aliquam ipsam itaque, incidunt necessitatibus et aut eum harum perspiciatis a odit alias accusantium! Fuga
        accusamus exercitationem magni ut mollitia? Aut, officiis laudantium.</p>
</body>

</html>
