<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Media Player</title>
</head>

<body>
    <h1>HTML Media Player</h1>
    <main>
        <h2>Audio Files</h2>
        <div class="audio">
            <div><audio src="sample-0.mp3" controls></audio></div>
            <div><audio src="sample-1.mp3" controls></audio></div>
            <div><audio src="sample-2.mp3" controls></audio></div>
            <div><audio src="sample-3.mp3" controls></audio></div>
            <div><audio src="sample-4.mp3" controls></audio></div>
            <div><audio src="sample-5.mp3" controls></audio></div>
        </div>
        <h2>Video Files</h2>
        <div class="video">
            <div><video src="video1.mp4" height="544" controls></video></div>
            <div><video src="video2.mp4" height="544" controls></video></div>
            <div><video src="video3.mp4" height="544" controls></video></div>
            <div><video src="video4.mp4" height="544" controls></video></div>
            <div><video src="video5.mp4" height="544" controls></video></div>
            <div><video src="video6.mp4" height="544" controls></video></div>
        </div>
    </main>
</body>

</html>

<!-- You are given 12 files; 6 audio and 6 video. Design a website using HTML only which shows these 12 files. -->
