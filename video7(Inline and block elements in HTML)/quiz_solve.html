<!-- Quick Quiz:
 Without using br tag, write a vertically aligned form asking for name, city and pincode of a user -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Asking user for information</title>
</head>

<body>
    <form action="POST">
        <div>
            <label for="name">Enter your name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>
        <div>
            <label for="city">Enter your city:</label>
            <input type="text" id="city" name="city" placeholder="Enter your city" required>
        </div>
        <div>
            <label for="pincode">Enter your pincode:</label>
            <input type="text" id="pincode" name="pincode" placeholder="Enter your pincode" required>
        </div>
    </form>
</body>

</html>
